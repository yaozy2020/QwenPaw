name: Unit Tests

on:
  push:
    branches: [main, master, dev, develop]
    paths:
      - 'src/qwenpaw/**'
      - 'tests/unit/**'
      - 'tests/conftest.py'
      - 'pyproject.toml'
      - '.github/workflows/unit-tests.yml'
  pull_request:
    branches: [main, master, dev, develop]
    paths:
      - 'src/qwenpaw/**'
      - 'tests/unit/**'
      - 'tests/conftest.py'
      - 'pyproject.toml'
      - '.github/workflows/unit-tests.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  spam-gate:
    name: PR Spam Gate
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/pr-spam-gate.yml
    with:
      author: ${{ github.event.pull_request.user.login }}

  unit-tests:
    name: Unit Tests - py${{ matrix.python-version }}
    needs: [spam-gate]
    if: |
      always() &&
      (needs.spam-gate.result == 'skipped' || needs.spam-gate.outputs.blocked != 'true')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run all unit tests (informational — pre-existing failures tolerated)
        continue-on-error: true
        run: |
          pytest tests/unit \
            --ignore=tests/unit/channels \
            -v \
            --tb=line \
            -q

      - name: Run agents unit tests (gate — must pass)
        run: |
          pytest \
            tests/unit/agents/hooks \
            tests/unit/agents/memory \
            tests/unit/agents/utils \
            -v \
            --tb=long \
            -s \
            --log-cli-level=WARNING

  coverage:
    name: Coverage Report
    needs: [spam-gate]
    if: |
      always() &&
      (needs.spam-gate.result == 'skipped' || needs.spam-gate.outputs.blocked != 'true')
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit \
            --ignore=tests/unit/channels \
            --cov=src/qwenpaw \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --tb=short \
            || true

      - name: Comment PR with coverage
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: orgoro/coverage@v3.2
        with:
          coverageFile: coverage.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          thresholdAll: 0.0
          thresholdNew: 0.0
          thresholdModified: 0.0
