# Release Installation Duty Roster
#
# Each platform has its own independent rotation list of GitHub usernames.
# The Action picks the next person sequentially:
#   index = (number of previous releases) % len(rotation)
# No state file needed — the count is derived from the GitHub Releases API.
#
# To temporarily swap, manually re-assign in the Duty Issue on GitHub.

